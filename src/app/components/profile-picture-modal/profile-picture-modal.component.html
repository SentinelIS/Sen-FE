<h2 mat-dialog-title>Profile Picture</h2>

<mat-dialog-content>
  <div class="preview-wrapper">
    <img *ngIf="selectedPreviewUrl || imageUrl; else noImage" [src]="selectedPreviewUrl || imageUrl" alt="Profile preview" />
    <ng-template #noImage>
      <div class="empty-preview">
        <mat-icon>photo_camera</mat-icon>
      </div>
    </ng-template>
  </div>

  <input type="file" accept="image/png,image/jpg,image/jpeg,image/gif,image/webp" (change)="onFileSelected($event)" />

  <p class="status" *ngIf="statusMessage">{{ statusMessage }}</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="isUploading" (click)="upload()">
    {{ isUploading ? 'Uploading...' : 'Upload / Update' }}
  </button>
</mat-dialog-actions>
