<div class="create-user-form">
  <form [formGroup]="form" (ngSubmit)="createUser()">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <mat-icon matPrefix>alternate_email</mat-icon>
        <input matInput formControlName="username" placeholder="e.g. jdoe" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Firstname</mat-label>
        <mat-icon matPrefix>person_outline</mat-icon>
        <input matInput formControlName="firstname" placeholder="e.g. John" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Surname</mat-label>
        <mat-icon matPrefix>person_outline</mat-icon>
        <input matInput formControlName="surname" placeholder="e.g. Doe" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Role</mat-label>
        <mat-icon matPrefix>badge</mat-icon>
        <input matInput formControlName="role" placeholder="e.g. admin or user" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput formControlName="password" type="password" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Repeat Password</mat-label>
        <mat-icon matPrefix>lock_clock</mat-icon>
        <input matInput formControlName="passwordRepeat" type="password" />
      </mat-form-field>
    </div>

    <div class="form-actions">
      <button mat-stroked-button type="button" (click)="generatePassword()" style="margin-right: 8px;">
        <mat-icon>vpn_key</mat-icon>
        Generate Password
      </button>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
        <mat-icon>person_add</mat-icon>
        Create User
      </button>
    </div>
  </form>
</div>
